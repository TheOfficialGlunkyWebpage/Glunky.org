<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            transition: opacity 0.8s ease-out;
        }

        /* Start Screen Styling */
        #start-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.5s ease;
        }

        #start-button {
            padding: 15px 40px;
            background: transparent;
            border: 1px solid #eeeeee;
            color: #888;
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        #start-button:hover {
            border-color: #333;
            color: #333;
            letter-spacing: 6px;
            background: #fafafa;
        }

        /* Main Content (Initially hidden) */
        .container {
            text-align: center;
            width: 85%;
            max-width: 500px;
            display: none; /* Hidden until button click */
            opacity: 0;
            transition: opacity 1s ease-in;
        }

        .loading-gif {
            width: 100%;
            max-width: 450px;
            height: auto;
            margin-bottom: 60px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.03));
        }

        /* Glassy Loading Bar Track */
        .progress-container {
            width: 100%;
            height: 12px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 50px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
            overflow: hidden;
            position: relative;
        }

        /* The Animated Bar */
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f8f8f8 0%, #7a7a7a 100%);
            border-radius: 50px;
            transition: width 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .percentage {
            margin-top: 25px;
            font-size: 11px;
            color: #cccccc;
            font-weight: 500;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body id="page-body">

    <div id="start-container">
        <button id="start-button" onclick="initiateLoad()">Start</button>
    </div>

    <audio id="loading-audio" loop>
        <source src="LoadingSong.mp3" type="audio/mpeg">
    </audio>

    <div class="container" id="main-content">
        <img src="https://uploads.onecompiler.io/446grdp2h/44fseqqbf/GlunkyLoad.gif" alt="Loading" class="loading-gif">
        
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        
        <div class="percentage" id="percentage-text">0%</div>
    </div>

    <script>
        const progressBar = document.getElementById('progress-bar');
        const percentageText = document.getElementById('percentage-text');
        const audio = document.getElementById('loading-audio');
        const body = document.getElementById('page-body');
        const startScreen = document.getElementById('start-container');
        const mainContent = document.getElementById('main-content');
        
        const nextURL = "glunky.html"; 
        let progress = 0;

        function initiateLoad() {
            // Hide the start button screen
            startScreen.style.opacity = '0';
            
            setTimeout(() => {
                startScreen.style.display = 'none';
                
                // Show the loading content
                mainContent.style.display = 'block';
                setTimeout(() => {
                    mainContent.style.opacity = '1';
                }, 50);

                // Play music (now allowed by browser)
                audio.play().catch(e => console.error("Playback failed:", e));

                // Start the stuttering bar
                runLoadingStutter();
            }, 500);
        }

        function runLoadingStutter() {
            let jump = Math.floor(Math.random() * 15) + 1;
            progress += jump;

            if (progress > 100) progress = 100;

            progressBar.style.width = progress + '%';
            percentageText.innerText = progress + '%';

            if (progress < 100) {
                let stutterTime = Math.floor(Math.random() * 1500) + 300;
                setTimeout(runLoadingStutter, stutterTime);
            } else {
                setTimeout(() => {
                    body.style.opacity = '0';
                    setTimeout(() => {
                        window.location.href = nextURL;
                    }, 800);
                }, 1200);
            }
        }
    </script>
</body>
</html>
