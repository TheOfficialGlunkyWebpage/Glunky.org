<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; height: 100vh;
            background-color: #ffffff; font-family: 'Inter', sans-serif;
            overflow: hidden; transition: opacity 0.8s ease-out;
        }
        #start-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; justify-content: center;
            align-items: center; z-index: 999; transition: opacity 0.5s ease;
        }
        #start-button {
            padding: 15px 40px; background: transparent; border: 1px solid #eeeeee;
            color: #888; font-size: 13px; letter-spacing: 4px; text-transform: uppercase;
            cursor: pointer; border-radius: 50px; transition: 0.3s;
        }
        #start-button:hover { border-color: #333; color: #333; letter-spacing: 6px; }
        
        .container { text-align: center; width: 85%; max-width: 500px; display: none; opacity: 0; }
        .loading-gif { width: 100%; max-width: 450px; margin-bottom: 60px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.03)); }
        
        .progress-container {
            width: 100%; height: 12px; background: rgba(0, 0, 0, 0.02);
            border-radius: 50px; border: 1px solid rgba(0, 0, 0, 0.06);
            backdrop-filter: blur(10px); overflow: hidden; position: relative;
        }
        .progress-bar {
            height: 100%; width: 0%; background: linear-gradient(90deg, #f8f8f8 0%, #7a7a7a 100%);
            border-radius: 50px; transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .percentage { margin-top: 25px; font-size: 11px; color: #cccccc; letter-spacing: 5px; text-transform: uppercase; }
        #status-text { margin-top: 10px; font-size: 10px; color: #e8e8e8; text-transform: uppercase; letter-spacing: 3px; }
    </style>
</head>
<body id="page-body">

    <div id="start-container">
        <button id="start-button" onclick="initiateLoad()">Start</button>
    </div>

    <audio id="loading-audio" loop><source src="LoadingSong.mp3" type="audio/mpeg"></audio>

    <div class="container" id="main-content">
        <img src="https://uploads.onecompiler.io/446grdp2h/44fseqqbf/GlunkyLoad.gif" class="loading-gif">
        <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
        <div class="percentage" id="percentage-text">0%</div>
        <div id="status-text">Loading...</div>
    </div>

    <script>
        // Updated with EXACT names from your screenshot
        const assets = [
            'Esoteric_Penguin.MP4', 
            'Rhodesia_Edit.MP4', 
            'MyMy_Edit.MP4', 
            'Trump_Mussolini_Edit.mp4', 
            'Glunky1.png', 
            'Bowden.mp4', 
            'Kanye.mp4', 
            'FantasticMrFox.mp4'
        ];

        let loadedCount = 0;
        const progressBar = document.getElementById('progress-bar');
        const percentageText = document.getElementById('percentage-text');
        const loadedAssets = new Set();
        
        function initiateLoad() {
            document.getElementById('start-container').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-container').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('main-content').style.opacity = '1';
                document.getElementById('loading-audio').play().catch(e => console.log("Audio load error:", e));
                preloadAssets();
            }, 500);
        }

        function preloadAssets() {
            assets.forEach(src => {
                const isVideo = src.toLowerCase().endsWith('.mp4');
                const element = isVideo ? document.createElement('video') : new Image();
                
                if (isVideo) {
                    element.src = src;
                    element.preload = 'auto';
                    element.oncanplaythrough = () => assetLoaded(src);
                    element.onloadeddata = () => assetLoaded(src); 
                } else {
                    element.src = src;
                    element.onload = () => assetLoaded(src);
                }
                
                element.onerror = () => {
                    console.warn("404 Not Found: " + src);
                    assetLoaded(src); 
                };
            });
        }

        function assetLoaded(src) {
            if(loadedAssets.has(src)) return;
            loadedAssets.add(src);
            
            loadedCount++;
            let realProgress = Math.floor((loadedCount / assets.length) * 100);
            
            progressBar.style.width = realProgress + '%';
            percentageText.innerText = realProgress + '%';

            if (loadedCount >= assets.length) {
                setTimeout(() => {
                    document.getElementById('page-body').style.opacity = '0';
                    setTimeout(() => { window.location.href = "glunky.html"; }, 800);
                }, 1500);
            }
        }
    </script>
</body>
</html>
