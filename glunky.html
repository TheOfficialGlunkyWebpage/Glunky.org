<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Sandbox - GitHub Optimized</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0; overflow: hidden; background: #0a0a0a;
            font-family: 'Inter', sans-serif; width: 100vw; height: 100vh;
        }
        #controls {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 12px; background: rgba(15, 15, 15, 0.95);
            display: flex; gap: 8px; z-index: 9999; justify-content: center;
            flex-wrap: wrap; border-bottom: 1px solid #333;
        }
        button {
            padding: 8px 14px; cursor: pointer; border: 1px solid #444;
            border-radius: 4px; background: #222; color: #eee;
            font-size: 13px; transition: 0.2s;
        }
        button:hover { background: #333; border-color: #888; }
        .btn-danger { background: #451a1a; border-color: #632a2a; }
        .active-delete { background: #ff3e3e !important; color: white; }

        .physics-element {
            position: absolute; top: 0; left: 0;
            pointer-events: none !important;
            will-change: transform;
            /* Forces GPU Rendering to stop stuttering */
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        video {
            width: 240px;
            display: block;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        #start-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
            color: white; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="start-overlay" onclick="this.remove()">
    <h1>Click to Initialize Sandbox</h1>
</div>

<div id="controls">
    <button onclick="spawn('Esoteric_Penguin.MP4')">Penguin</button>
    <button onclick="spawn('Rhodesia_Edit.MP4')">Rhodesia</button>
    <button onclick="spawn('MyMy_Edit.MP4')">MyMy</button>
    <button onclick="spawn('Trump_Mussolini_Edit.mp4')">Trump</button>
    <button onclick="spawn('Bowden.mp4')">Bowden</button>
    <button onclick="spawn('Kanye.mp4')">Kanye</button>
    <button onclick="spawn('FantasticMrFox.mp4')">Mr. Fox</button>
    <button id="deleteBtn" class="btn-danger" onclick="toggleDeleteMode()">Delete Mode: OFF</button>
    <button class="btn-danger" onclick="clearAll()">Clear All</button>
</div>

<script>
    const { Engine, Bodies, Composite, MouseConstraint, Mouse, Events, Body } = Matter;

    const engine = Engine.create();
    const world = engine.world;

    // Physics Boundaries
    const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 50, window.innerWidth + 1000, 100, { isStatic: true });
    const leftWall = Bodies.rectangle(-50, window.innerHeight / 2, 100, window.innerHeight * 5, { isStatic: true });
    const rightWall = Bodies.rectangle(window.innerWidth + 50, window.innerHeight / 2, 100, window.innerHeight * 5, { isStatic: true });
    Composite.add(world, [ground, leftWall, rightWall]);

    const mouse = Mouse.create(document.body);
    const mouseConstraint = MouseConstraint.create(engine, {
        mouse: mouse,
        constraint: { stiffness: 0.15, render: { visible: false } }
    });
    Composite.add(world, mouseConstraint);

    let deleteMode = false;
    let mediaPairs = [];

    function toggleDeleteMode() {
        deleteMode = !deleteMode;
        const btn = document.getElementById('deleteBtn');
        btn.innerText = `Delete Mode: ${deleteMode ? 'ON' : 'OFF'}`;
        btn.classList.toggle('active-delete');
    }

    function clearAll() {
        mediaPairs.forEach(p => { p.el.remove(); Composite.remove(world, p.body); });
        mediaPairs = [];
    }

    function spawn(filename) {
        const el = document.createElement('div');
        el.className = 'physics-element';
        
        const v = document.createElement('video');
        v.src = filename;
        v.loop = true;
        v.autoplay = true;
        v.playsInline = true;
        v.muted = false;
        v.preload = "auto"; // CRITICAL for GitHub hosting

        el.appendChild(v);
        document.body.appendChild(el);

        v.onloadedmetadata = () => {
            const w = 240;
            const h = (v.videoHeight / v.videoWidth) * w;
            const body = Bodies.rectangle(window.innerWidth / 2, -150, w, h, {
                restitution: 0.5,
                frictionAir: 0,
                friction: 0.01
            });
            Composite.add(world, body);
            mediaPairs.push({ body, el, width: w, height: h });
            v.play().catch(e => console.log("Playback interrupted"));
        };
    }

    Events.on(mouseConstraint, "mousedown", function() {
        if (deleteMode && mouseConstraint.body && !mouseConstraint.body.isStatic) {
            const index = mediaPairs.findIndex(p => p.body === mouseConstraint.body);
            if (index > -1) {
                mediaPairs[index].el.remove();
                Composite.remove(world, mouseConstraint.body);
                mediaPairs.splice(index, 1);
            }
        }
    });

    (function loop() {
        mediaPairs.forEach(p => {
            const { x, y } = p.body.position;
            p.el.style.transform = `translate3d(${x - p.width/2}px, ${y - p.height/2}px, 0) rotate(${p.body.angle}rad)`;
        });
        Engine.update(engine);
        requestAnimationFrame(loop);
    })();

    window.addEventListener('resize', () => {
        Body.setPosition(ground, { x: window.innerWidth/2, y: window.innerHeight+50 });
    });
</script>
</body>
</html>
