<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Sandbox</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0f0f0f;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            width: 100vw;
            height: 100vh;
        }

        #controls {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 12px;
            background: rgba(20, 20, 20, 0.9);
            display: flex;
            gap: 8px;
            z-index: 9999;
            justify-content: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #333;
        }

        button {
            padding: 8px 14px;
            cursor: pointer;
            border: 1px solid #444;
            border-radius: 4px;
            background: #2a2a2a;
            color: #eee;
            font-size: 13px;
            font-weight: 500;
            transition: 0.2s;
        }

        button:hover { background: #3d3d3d; border-color: #777; }
        
        .btn-danger { background: #4a1a1a; border-color: #722f2f; }
        .btn-danger:hover { background: #722f2f; }
        
        button.active-delete { 
            background: #ff3e3e; 
            color: white;
            border-color: white;
            box-shadow: 0 0 15px rgba(255, 62, 62, 0.4);
        }

        .physics-element {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none !important; 
            will-change: transform;
        }

        video, img {
            width: 260px;
            display: block;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        body.delete-cursor { cursor: crosshair; }
    </style>
</head>
<body id="main-body">

<div id="controls">
    <button onclick="spawn('video', 'Esoteric_Penguin.MP4')">Penguin</button>
    <button onclick="spawn('video', 'Rhodesia_Edit.MP4')">Rhodesia</button>
    <button onclick="spawn('video', 'MyMy_Edit.MP4')">MyMy</button>
    <button onclick="spawn('video', 'Trump_Mussolini_Edit.mp4')">Trump/Mussolini</button>
    
    <button onclick="spawn('photo', 'Glunky1.png')">Glunky</button>
    <button onclick="spawn('video', 'Bowden.mp4')">Bowden</button>
    <button onclick="spawn('video', 'Kanye.mp4')">Kanye</button>
    <button onclick="spawn('video', 'FantasticMrFox.mp4')">Mr. Fox</button>

    <button id="deleteBtn" class="btn-danger" onclick="toggleDeleteMode()">Delete Mode: OFF</button>
    <button class="btn-danger" onclick="clearAll()">Clear All</button>
</div>

<script>
    const { Engine, Bodies, Composite, MouseConstraint, Mouse, Events, Body } = Matter;

    const engine = Engine.create();
    const world = engine.world;
    engine.gravity.y = 1.0; 

    // Floor and Walls
    const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 50, window.innerWidth + 500, 100, { isStatic: true });
    const leftWall = Bodies.rectangle(-50, window.innerHeight / 2, 100, window.innerHeight * 2, { isStatic: true });
    const rightWall = Bodies.rectangle(window.innerWidth + 50, window.innerHeight / 2, 100, window.innerHeight * 2, { isStatic: true });
    Composite.add(world, [ground, leftWall, rightWall]);

    // Mouse Setup
    const mouse = Mouse.create(document.body);
    const mouseConstraint = MouseConstraint.create(engine, {
        mouse: mouse,
        constraint: { stiffness: 0.15, render: { visible: false } }
    });
    Composite.add(world, mouseConstraint);

    let deleteMode = false;
    let mediaPairs = [];

    function toggleDeleteMode() {
        deleteMode = !deleteMode;
        const btn = document.getElementById('deleteBtn');
        btn.innerText = `Delete Mode: ${deleteMode ? 'ON' : 'OFF'}`;
        btn.classList.toggle('active-delete');
        document.body.classList.toggle('delete-cursor');
    }

    function clearAll() {
        mediaPairs.forEach(pair => {
            pair.el.remove();
            Composite.remove(world, pair.body);
        });
        mediaPairs = [];
    }

    function spawn(type, source) {
        const el = document.createElement('div');
        el.className = 'physics-element';
        
        let media;
        if (type === 'video') {
            media = document.createElement('video');
            media.src = source;
            media.autoplay = true;
            media.loop = true;
            media.playsInline = true;
        } else {
            media = document.createElement('img');
            media.src = source;
        }
        
        el.appendChild(media);
        document.body.appendChild(el);

        // Standard logic to wait for load so we can calculate physics size
        const onLoaded = () => {
            const width = 260;
            const height = (media.tagName === 'VIDEO' ? media.videoHeight / media.videoWidth : media.naturalHeight / media.naturalWidth) * width;

            const body = Bodies.rectangle(window.innerWidth / 2, -150, width, height, {
                frictionAir: 0, 
                restitution: 0.5,
                friction: 0.005
            });

            Composite.add(world, body);
            mediaPairs.push({ body, el, width, height });
        };

        if (type === 'video') media.onloadedmetadata = onLoaded;
        else media.onload = onLoaded;
    }

    // Interaction (Drag/Delete)
    Events.on(mouseConstraint, "mousedown", function(event) {
        if (mouseConstraint.body && !mouseConstraint.body.isStatic) {
            if (deleteMode) {
                const target = mouseConstraint.body;
                const index = mediaPairs.findIndex(p => p.body === target);
                if (index > -1) {
                    mediaPairs[index].el.remove();
                    Composite.remove(world, target);
                    mediaPairs.splice(index, 1);
                }
            }
        }
    });

    // Animation Loop
    (function update() {
        mediaPairs.forEach(pair => {
            const { x, y } = pair.body.position;
            const angle = pair.body.angle;
            pair.el.style.transform = `translate(${x - pair.width/2}px, ${y - pair.height/2}px) rotate(${angle}rad)`;
        });
        Engine.update(engine);
        requestAnimationFrame(update);
    })();

    window.addEventListener('resize', () => {
        Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight + 50 });
    });
</script>
</body>
</html>
